<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 100" width="400" height="100">
  <!-- Minimalist Lion Profile - clean, geometric -->
  <g transform="translate(10, 8)">
    <!-- Mane - clean arcs -->
    <path d="M42 10 C22 10, 6 26, 6 46 C6 66, 18 80, 38 82"
          stroke="#1a1a2e" stroke-width="3" fill="none" stroke-linecap="round"/>
    <path d="M36 6 C18 8, 2 22, 2 42 C2 62, 12 76, 30 82"
          stroke="#1a1a2e" stroke-width="2.5" fill="none" stroke-linecap="round" opacity="0.5"/>
    <path d="M48 8 C28 4, 10 18, 10 42 C10 58, 16 72, 34 80"
          stroke="#1a1a2e" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.3"/>

    <!-- Head - clean geometric shape -->
    <path d="M42 18 C32 18, 22 28, 22 42 C22 56, 30 68, 42 72 C54 68, 62 56, 62 42 C62 28, 52 18, 42 18Z"
          fill="#1a1a2e"/>

    <!-- Inner face detail -->
    <path d="M42 26 C36 26, 30 32, 30 40 C30 50, 34 58, 42 62 C50 58, 54 50, 54 40 C54 32, 48 26, 42 26Z"
          fill="#16213e"/>

    <!-- Eye -->
    <circle cx="44" cy="38" r="3" fill="#c9a84c"/>
    <circle cx="44" cy="38" r="1.5" fill="#1a1a2e"/>

    <!-- Nose bridge line -->
    <line x1="42" y1="44" x2="42" y2="52" stroke="#c9a84c" stroke-width="1.5" opacity="0.6"/>

    <!-- Nose -->
    <path d="M39 52 L42 56 L45 52Z" fill="#c9a84c" opacity="0.8"/>
  </g>

  <!-- Typography -->
  <text x="95" y="45" font-family="Georgia, 'Times New Roman', serif" font-size="36" font-weight="700" fill="#1a1a2e" letter-spacing="1">
    LEO
  </text>
  <text x="95" y="72" font-family="'Helvetica Neue', Arial, sans-serif" font-size="13" font-weight="300" fill="#666" letter-spacing="5">
    AI ANALYTICS
  </text>

  <!-- Subtle gold accent -->
  <line x1="95" y1="50" x2="175" y2="50" stroke="#c9a84c" stroke-width="1.2"/>
</svg>
