<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 440 100" width="440" height="100">
  <!-- Refined lion head - front-facing, symmetrical, regal -->
  <g transform="translate(50, 50) scale(0.9)">
    <!-- Outer mane - flowing, layered -->
    <path d="M0 -44 C-8 -46, -18 -44, -26 -38 C-34 -32, -40 -22, -42 -10 C-44 2, -42 14, -38 24 C-34 34, -26 42, -16 44"
          stroke="#1B2A4A" stroke-width="3" fill="none" stroke-linecap="round"/>
    <path d="M0 -44 C8 -46, 18 -44, 26 -38 C34 -32, 40 -22, 42 -10 C44 2, 42 14, 38 24 C34 34, 26 42, 16 44"
          stroke="#1B2A4A" stroke-width="3" fill="none" stroke-linecap="round"/>

    <!-- Inner mane layer -->
    <path d="M-4 -42 C-14 -42, -24 -36, -30 -26 C-36 -16, -38 -4, -36 8 C-34 20, -28 32, -18 40"
          stroke="#1B2A4A" stroke-width="2.5" fill="none" stroke-linecap="round" opacity="0.6"/>
    <path d="M4 -42 C14 -42, 24 -36, 30 -26 C36 -16, 38 -4, 36 8 C34 20, 28 32, 18 40"
          stroke="#1B2A4A" stroke-width="2.5" fill="none" stroke-linecap="round" opacity="0.6"/>

    <!-- Third mane layer - wispy -->
    <path d="M-8 -40 C-18 -38, -28 -28, -32 -16 C-36 -4, -34 10, -28 22"
          stroke="#1B2A4A" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.35"/>
    <path d="M8 -40 C18 -38, 28 -28, 32 -16 C36 -4, 34 10, 28 22"
          stroke="#1B2A4A" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.35"/>

    <!-- Face shape -->
    <path d="M0 -34 C-14 -34, -24 -22, -24 -8 C-24 8, -16 22, 0 28 C16 22, 24 8, 24 -8 C24 -22, 14 -34, 0 -34Z"
          fill="#1B2A4A"/>

    <!-- Ears -->
    <path d="M-18 -30 C-22 -38, -16 -44, -10 -38" fill="#1B2A4A"/>
    <path d="M18 -30 C22 -38, 16 -44, 10 -38" fill="#1B2A4A"/>

    <!-- Eyes - sharp, golden -->
    <path d="M-12 -14 C-10 -18, -4 -18, -2 -14 C-4 -11, -10 -11, -12 -14Z" fill="#C9A84C"/>
    <circle cx="-7" cy="-14" r="2" fill="#1B2A4A"/>

    <path d="M12 -14 C10 -18, 4 -18, 2 -14 C4 -11, 10 -11, 12 -14Z" fill="#C9A84C"/>
    <circle cx="7" cy="-14" r="2" fill="#1B2A4A"/>

    <!-- Nose -->
    <path d="M-4 0 C-4 -3, -2 -5, 0 -5 C2 -5, 4 -3, 4 0 C4 2, 2 4, 0 4 C-2 4, -4 2, -4 0Z"
          fill="#C9A84C" opacity="0.85"/>

    <!-- Nose to mouth line -->
    <line x1="0" y1="4" x2="0" y2="10" stroke="#C9A84C" stroke-width="1" opacity="0.5"/>

    <!-- Mouth -->
    <path d="M-8 12 C-4 16, 4 16, 8 12" stroke="#C9A84C" stroke-width="1.2" fill="none" opacity="0.5"/>

    <!-- Chin whisker marks -->
    <line x1="-6" y1="8" x2="-14" y2="6" stroke="#C9A84C" stroke-width="0.8" opacity="0.3"/>
    <line x1="-5" y1="10" x2="-14" y2="10" stroke="#C9A84C" stroke-width="0.8" opacity="0.3"/>
    <line x1="6" y1="8" x2="14" y2="6" stroke="#C9A84C" stroke-width="0.8" opacity="0.3"/>
    <line x1="5" y1="10" x2="14" y2="10" stroke="#C9A84C" stroke-width="0.8" opacity="0.3"/>
  </g>

  <!-- Typography - right of lion -->
  <text x="120" y="42" font-family="Georgia, 'Times New Roman', serif" font-size="38" font-weight="700" fill="#1B2A4A" letter-spacing="4">
    LEO
  </text>

  <!-- Fine gold rule -->
  <line x1="120" y1="50" x2="218" y2="50" stroke="#C9A84C" stroke-width="0.8"/>

  <!-- Subtitle -->
  <text x="120" y="68" font-family="'Helvetica Neue', Arial, sans-serif" font-size="12" font-weight="300" fill="#777" letter-spacing="5.5">
    AI ANALYTICS
  </text>
</svg>
