<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 440 100" width="440" height="100">
  <!-- Lion head side profile - classic heraldic style, single color -->
  <g transform="translate(8, 6) scale(0.85)">

    <!-- Mane - flowing right -->
    <path d="M50 10 C38 4, 22 6, 14 16 C6 26, 4 40, 8 52 C12 64, 22 74, 36 78 C30 72, 26 62, 24 50 C22 38, 26 26, 34 18 C38 14, 44 12, 50 12Z"
          fill="#1B2A4A"/>

    <!-- Mane top flow -->
    <path d="M52 8 C44 2, 32 2, 22 8 C12 14, 6 26, 6 38"
          stroke="#1B2A4A" stroke-width="4" fill="none" stroke-linecap="round"/>
    <path d="M56 10 C48 0, 34 -2, 20 4 C8 10, 0 24, 0 40 C0 52, 4 62, 12 70"
          stroke="#1B2A4A" stroke-width="3" fill="none" stroke-linecap="round" opacity="0.5"/>
    <path d="M46 6 C38 0, 26 0, 16 8 C8 16, 4 28, 6 42"
          stroke="#1B2A4A" stroke-width="2.5" fill="none" stroke-linecap="round" opacity="0.3"/>

    <!-- Head -->
    <path d="M40 14 C32 14, 24 22, 24 34 C24 46, 30 56, 40 62 C50 56, 62 48, 66 38 C70 28, 66 18, 56 14 C52 12, 44 12, 40 14Z"
          fill="#1B2A4A"/>

    <!-- Ear -->
    <path d="M44 12 C42 4, 48 2, 52 8 C54 12, 50 14, 48 14Z" fill="#1B2A4A"/>

    <!-- Eye -->
    <circle cx="48" cy="28" r="4" fill="#C9A84C"/>
    <circle cx="48" cy="28" r="2" fill="#1B2A4A"/>
    <circle cx="49" cy="27" r="0.8" fill="#C9A84C"/>

    <!-- Brow ridge -->
    <path d="M42 22 C44 20, 52 20, 56 24" stroke="#C9A84C" stroke-width="1.2" fill="none" opacity="0.5"/>

    <!-- Snout -->
    <path d="M58 34 C64 34, 72 36, 74 40 C76 44, 72 48, 66 48 C60 48, 54 46, 50 42"
          fill="#243356"/>

    <!-- Nose -->
    <ellipse cx="72" cy="38" rx="3" ry="2.5" fill="#C9A84C" opacity="0.8"/>

    <!-- Jaw -->
    <path d="M50 48 C44 54, 38 60, 36 66 C34 70, 36 74, 40 76"
          stroke="#1B2A4A" stroke-width="3" fill="none" stroke-linecap="round"/>

    <!-- Lower jaw line -->
    <path d="M66 48 C60 52, 52 56, 44 60"
          stroke="#1B2A4A" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.6"/>
  </g>

  <!-- Typography -->
  <text x="100" y="42" font-family="Georgia, 'Times New Roman', serif" font-size="38" font-weight="700" fill="#1B2A4A" letter-spacing="4">
    LEO
  </text>

  <!-- Fine gold accent -->
  <line x1="100" y1="50" x2="198" y2="50" stroke="#C9A84C" stroke-width="1"/>

  <!-- Subtitle -->
  <text x="100" y="68" font-family="'Helvetica Neue', Arial, sans-serif" font-size="12" font-weight="300" fill="#777" letter-spacing="5.5">
    AI ANALYTICS
  </text>
</svg>
